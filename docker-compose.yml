  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    # grafana 默认运行用户（避免权限问题）
    user: "472"
    network_mode: host
    environment:
      - TZ=Asia/Shanghai
      - GF_SECURITY_ADMIN_PASSWORD=admin   # 默认管理员密码
      # 同时输出日志到控制台 + 文件
      - GF_LOG_MODE=console file
      # 指定日志目录（对应下面挂载）
      - GF_PATHS_LOGS=/var/log/grafana
    volumes:
      # 数据目录（最重要）
      - ./grafana/data:/var/lib/grafana
      # 日志目录（排查问题用）
      - ./grafana/logs:/var/log/grafana
      # provisioning（自动化配置）
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: always

  # 监控栈反向代理；各上游在 nginx/conf.d/ 下单独建 .conf，按需增加 ports 映射
  nginx:
    image: nginx:latest
    container_name: monitoring-nginx
    ports:
      - "19093:9093"   # Alertmanager（见 nginx/conf.d/alertmanager.conf）
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    restart: always
